<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scream-O-Meter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a0533 0%, #2d0a4e 50%, #1a0533 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #app {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    #emoji { font-size: 64px; margin-bottom: 1rem; line-height: 1; }
    #emoji.shake { animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px) rotate(-4deg); }
      75% { transform: translateX(6px) rotate(4deg); }
    }

    h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 0.4rem; }
    .sub { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 2rem; }

    .meter-wrap {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      height: 42px;
      overflow: hidden;
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #meter-bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      transition: width 0.08s ease;
    }

    #pct { font-size: 40px; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }

    #status {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1.5rem;
      min-height: 20px;
    }
    #status.loud { color: #f472b6; font-weight: 600; }

    .vol-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 1.5rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: background 0.1s, transform 0.1s; }
    .dot.active { background: #ec4899; transform: scale(1.4); }

    .btn-primary {
      padding: 14px 44px;
      border-radius: 99px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      padding: 11px 30px;
      border-radius: 99px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: rgba(255,255,255,0.8);
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    .hint { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 1rem; min-height: 16px; }

    .winner { display: none; flex-direction: column; align-items: center; gap: 1.2rem; }
    .winner h2 { font-size: 28px; font-weight: 700; color: #fff; }
    .winner p { font-size: 15px; color: rgba(255,255,255,0.6); }

    .playback-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 1.25rem;
      width: 100%;
      display: none;
    }
    .playback-label { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 0.75rem; letter-spacing: 0.06em; text-transform: uppercase; }
    .playback-controls { display: flex; align-items: center; gap: 12px; }
    #play-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #play-btn:hover { opacity: 0.85; }
    .waveform { flex: 1; height: 32px; display: flex; align-items: center; gap: 2px; }
    .wave-bar { flex: 1; background: rgba(255,255,255,0.2); border-radius: 2px; }
    .wave-bar.played { background: #ec4899; }

    .note-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      width: 100%;
      text-align: left;
    }
    .note-label { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 0.6rem; letter-spacing: 0.05em; text-transform: uppercase; }
    #user-note {
      width: 100%; border: none; background: transparent;
      font-size: 15px; color: #fff; font-family: inherit;
      resize: none; outline: none; min-height: 56px; line-height: 1.6;
    }
    #user-note::placeholder { color: rgba(255,255,255,0.3); }

    .submitted-note {
      font-size: 17px; font-weight: 500; color: #fff; font-style: italic;
      padding: 1rem 1.5rem;
      border-left: 4px solid #ec4899;
      text-align: left; width: 100%;
      border-radius: 0 12px 12px 0;
      background: rgba(236,72,153,0.1);
      display: none;
    }
    .breathe { font-size: 13px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
<div id="app">

  <div id="game-screen">
    <div id="emoji">😐</div>
    <h1>Scream-O-Meter</h1>
    <p class="sub">Yell it all out — scream LOUD to fill the bar!</p>
    <div class="meter-wrap"><div id="meter-bar"></div></div>
    <div id="pct">0%</div>
    <div class="vol-dots">
      <div class="dot" id="d1"></div><div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div><div class="dot" id="d4"></div>
      <div class="dot" id="d5"></div>
    </div>
    <div id="status">Press start, then SCREAM your lungs out!</div>
    <button class="btn-primary" id="start-btn">🎤 Start Screaming</button>
    <p class="hint" id="hint"></p>
  </div>

  <div class="winner" id="winner-screen">
    <div style="font-size:64px">🎉</div>
    <h2>YOU DID IT!</h2>
    <p>You screamed your stress away like a champion!</p>

    <div class="playback-box" id="playback-box">
      <div class="playback-label">Your scream — play it back 🔊</div>
      <div class="playback-controls">
        <button id="play-btn">▶</button>
        <div class="waveform" id="waveform"></div>
      </div>
    </div>

    <div class="note-box" id="note-input-area">
      <div class="note-label">How do you feel now? ✍️</div>
      <textarea id="user-note" placeholder="Feeling better now..."></textarea>
      <button class="btn-primary" id="submit-note" style="margin-top:0.75rem;padding:10px 24px;font-size:14px;">Submit</button>
    </div>

    <div class="submitted-note" id="submitted-note"></div>
    <p class="breathe">Take a deep breath... you deserve it. 🌿</p>
    <button class="btn-secondary" id="reset-btn">Play again</button>
  </div>

</div>
<script>
  let audioCtx, analyser, mic, animId;
  let mediaRecorder, recordedChunks = [];
  let audioEl = null;
  let progress = 0, running = false;

  const bar = document.getElementById('meter-bar');
  const pct = document.getElementById('pct');
  const status = document.getElementById('status');
  const startBtn = document.getElementById('start-btn');
  const emojiEl = document.getElementById('emoji');
  const gameScreen = document.getElementById('game-screen');
  const winnerScreen = document.getElementById('winner-screen');
  const resetBtn = document.getElementById('reset-btn');
  const submitNote = document.getElementById('submit-note');
  const userNote = document.getElementById('user-note');
  const submittedNote = document.getElementById('submitted-note');
  const noteInputArea = document.getElementById('note-input-area');
  const playbackBox = document.getElementById('playback-box');
  const playBtn = document.getElementById('play-btn');
  const waveform = document.getElementById('waveform');
  const hint = document.getElementById('hint');
  const dots = [1,2,3,4,5].map(i => document.getElementById('d'+i));

  for (let i = 0; i < 28; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    b.style.height = (Math.random() * 20 + 8) + 'px';
    waveform.appendChild(b);
  }

  const emojis = ['😐','😬','😤','😠','😡','🤬','🔥','💥'];
  function getEmoji(p) { return emojis[Math.min(Math.floor((p/100)*(emojis.length-1)), emojis.length-1)]; }

  function updateDots(avg) {
    const level = Math.floor(Math.max(0, (avg - 40) / 60) * 5);
    dots.forEach((d, i) => d.classList.toggle('active', i < level));
  }

  async function startGame() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.6;
      mic = audioCtx.createMediaStreamSource(stream);
      mic.connect(analyser);

      recordedChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        audioEl = new Audio(url);
        audioEl.onended = () => { playBtn.textContent = '▶'; };
        playbackBox.style.display = 'block';
      };
      mediaRecorder.start();

      running = true;
      startBtn.textContent = '⏹ Stop';
      status.textContent = 'Go! SCREAM as loud as you can!';
      status.classList.remove('loud');
      hint.textContent = "Normal talking won't fill the bar — you need to SCREAM!";
      tick();
    } catch(e) {
      status.textContent = 'Mic access denied. Please allow microphone access.';
    }
  }

  function tick() {
    if (!running) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const screamRange = data.slice(10, 80);
    const avg = screamRange.reduce((a,b) => a+b, 0) / screamRange.length;

    updateDots(avg);

    const THRESHOLD = 55;
    if (avg > THRESHOLD) {
      const boost = (avg - THRESHOLD) / 80;
      progress = Math.min(100, progress + boost * 1.8);
      status.textContent = avg > 90 ? '🔥 AMAZING! KEEP GOING!' : avg > 70 ? "LOUDER! You're doing great!" : 'Good! Scream harder!';
      status.classList.add('loud');
      emojiEl.classList.add('shake');
    } else {
      progress = Math.max(0, progress - 0.15);
      status.textContent = avg > 30 ? "Too quiet! SCREAM, don't just talk!" : "We can barely hear you... SCREAM!";
      status.classList.remove('loud');
      emojiEl.classList.remove('shake');
    }

    const p = Math.round(progress);
    bar.style.width = p + '%';
    pct.textContent = p + '%';
    emojiEl.textContent = getEmoji(p);

    if (progress >= 100) { stopGame(); showWinner(); return; }
    animId = requestAnimationFrame(tick);
  }

  function stopGame() {
    running = false;
    if (animId) cancelAnimationFrame(animId);
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    if (audioCtx) audioCtx.close();
    startBtn.textContent = '🎤 Start Screaming';
    dots.forEach(d => d.classList.remove('active'));
  }

  playBtn.addEventListener('click', () => {
    if (!audioEl) return;
    if (audioEl.paused) {
      audioEl.play();
      playBtn.textContent = '⏸';
      animateWave();
    } else {
      audioEl.pause();
      playBtn.textContent = '▶';
    }
  });

  function animateWave() {
    if (!audioEl || audioEl.paused) return;
    const bars = waveform.querySelectorAll('.wave-bar');
    const ratio = audioEl.currentTime / (audioEl.duration || 1);
    const played = Math.floor(ratio * bars.length);
    bars.forEach((b, i) => b.classList.toggle('played', i < played));
    requestAnimationFrame(animateWave);
  }

  function showWinner() {
    gameScreen.style.display = 'none';
    winnerScreen.style.display = 'flex';
    noteInputArea.style.display = 'block';
    submittedNote.style.display = 'none';
    userNote.value = '';
  }

  submitNote.addEventListener('click', () => {
    const note = userNote.value.trim() || 'Feeling better now...';
    noteInputArea.style.display = 'none';
    submittedNote.textContent = '"' + note + '"';
    submittedNote.style.display = 'block';
  });

  resetBtn.addEventListener('click', () => {
    progress = 0; audioEl = null;
    bar.style.width = '0%';
    pct.textContent = '0%';
    emojiEl.textContent = '😐';
    status.textContent = 'Press start, then SCREAM your lungs out!';
    status.classList.remove('loud');
    hint.textContent = '';
    playbackBox.style.display = 'none';
    playBtn.textContent = '▶';
    waveform.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('played'));
    gameScreen.style.display = 'block';
    winnerScreen.style.display = 'none';
  });

  startBtn.addEventListener('click', () => {
    if (running) { stopGame(); status.textContent = 'Paused. Press start to continue!'; status.classList.remove('loud'); }
    else { startGame(); }
  });
</script>
</body>
</html>
