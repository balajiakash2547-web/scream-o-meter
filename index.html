<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scream-O-Meter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #app {
      background: #ffffff;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(120, 100, 220, 0.10);
    }

    #emoji { font-size: 56px; margin-bottom: 1rem; line-height: 1; }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.4rem;
    }

    .sub {
      font-size: 15px;
      color: #6b6b80;
      margin-bottom: 2rem;
    }

    .meter-wrap {
      width: 100%;
      background: #eeecff;
      border-radius: 99px;
      height: 38px;
      overflow: hidden;
      margin-bottom: 1rem;
      border: 1px solid #d6d0f8;
    }

    #meter-bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: #7F77DD;
      transition: width 0.1s ease, background 0.3s;
    }

    #pct {
      font-size: 36px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    #status {
      font-size: 14px;
      color: #6b6b80;
      margin-bottom: 2rem;
      min-height: 20px;
    }

    #start-btn {
      padding: 14px 40px;
      border-radius: 14px;
      border: 1.5px solid #b0a8f0;
      background: #7F77DD;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    #start-btn:hover { background: #6a62c8; }
    #start-btn:active { transform: scale(0.97); }

    .winner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .winner h2 {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .winner p {
      font-size: 15px;
      color: #6b6b80;
    }

    .note-box {
      background: #f9f8ff;
      border: 1px solid #d6d0f8;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      width: 100%;
      text-align: left;
    }

    .note-label {
      font-size: 12px;
      color: #9490b5;
      margin-bottom: 0.6rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #user-note {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 15px;
      color: #1a1a2e;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 60px;
      line-height: 1.6;
    }

    #submit-note {
      margin-top: 0.75rem;
      padding: 10px 24px;
      border-radius: 12px;
      border: 1.5px solid #b0a8f0;
      background: #7F77DD;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    #submit-note:hover { background: #6a62c8; }

    .submitted-note {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a2e;
      font-style: italic;
      padding: 1rem 1.5rem;
      border-left: 4px solid #7F77DD;
      text-align: left;
      width: 100%;
      border-radius: 0 12px 12px 0;
      background: #f4f2ff;
      display: none;
    }

    #reset-btn {
      padding: 11px 30px;
      border-radius: 12px;
      border: 1.5px solid #b0a8f0;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #7F77DD;
      font-family: inherit;
      transition: background 0.15s;
    }

    #reset-btn:hover { background: #f4f2ff; }

    .breathe {
      font-size: 13px;
      color: #9490b5;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Game Screen -->
  <div id="game-screen">
    <div id="emoji">😐</div>
    <h1>Scream-O-Meter</h1>
    <p class="sub">Scream your stress away — fill the bar to 100%!</p>
    <div class="meter-wrap">
      <div id="meter-bar"></div>
    </div>
    <div id="pct">0%</div>
    <div id="status">Press start, then SCREAM!</div>
    <button id="start-btn">Start Screaming</button>
  </div>

  <!-- Winner Screen -->
  <div class="winner" id="winner-screen">
    <div style="font-size:60px">🎉</div>
    <h2>YOU DID IT!</h2>
    <p>You screamed your stress away like a champion!</p>

    <div class="note-box" id="note-input-area">
      <div class="note-label">How do you feel right now? Leave a note ✍️</div>
      <textarea id="user-note" placeholder="Feeling better now..."></textarea>
      <button id="submit-note">Submit</button>
    </div>

    <div class="submitted-note" id="submitted-note"></div>

    <p class="breathe">Take a deep breath... you deserve it. 🌿</p>
    <button id="reset-btn">Play again</button>
  </div>

</div>

<script>
  let audioCtx, analyser, mic, animId;
  let progress = 0;
  let running = false;

  const bar = document.getElementById('meter-bar');
  const pct = document.getElementById('pct');
  const status = document.getElementById('status');
  const startBtn = document.getElementById('start-btn');
  const emoji = document.getElementById('emoji');
  const gameScreen = document.getElementById('game-screen');
  const winnerScreen = document.getElementById('winner-screen');
  const resetBtn = document.getElementById('reset-btn');
  const submitNote = document.getElementById('submit-note');
  const userNote = document.getElementById('user-note');
  const submittedNote = document.getElementById('submitted-note');
  const noteInputArea = document.getElementById('note-input-area');

  const emojis = ['😐','😬','😤','😠','😡','🤬','🔥','💥'];
  const colors = ['#7F77DD','#8B77CC','#C46E2A','#D85A30','#C43030','#A32D2D'];

  function getEmoji(p) {
    return emojis[Math.min(Math.floor((p / 100) * (emojis.length - 1)), emojis.length - 1)];
  }
  function getColor(p) {
    return colors[Math.min(Math.floor((p / 100) * (colors.length - 1)), colors.length - 1)];
  }

  async function startGame() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      mic = audioCtx.createMediaStreamSource(stream);
      mic.connect(analyser);
      running = true;
      startBtn.textContent = 'Stop';
      status.textContent = 'Go! SCREAM as loud as you can!';
      tick();
    } catch (e) {
      status.textContent = 'Mic access denied. Please allow microphone access.';
    }
  }

  function tick() {
    if (!running) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    const boost = Math.max(0, (avg - 10) / 90);
    progress = Math.min(100, progress + boost * 2.5);
    const p = Math.round(progress);
    bar.style.width = p + '%';
    bar.style.background = getColor(p);
    pct.textContent = p + '%';
    emoji.textContent = getEmoji(p);
    status.textContent = avg > 60
      ? 'LOUDER! Keep going!'
      : avg > 30
        ? 'Good! Scream harder!'
        : 'We can barely hear you... SCREAM!';
    if (progress >= 100) { stopGame(); showWinner(); return; }
    animId = requestAnimationFrame(tick);
  }

  function stopGame() {
    running = false;
    if (animId) cancelAnimationFrame(animId);
    if (audioCtx) audioCtx.close();
    startBtn.textContent = 'Start Screaming';
  }

  function showWinner() {
    gameScreen.style.display = 'none';
    winnerScreen.style.display = 'flex';
    noteInputArea.style.display = 'block';
    submittedNote.style.display = 'none';
    userNote.value = '';
  }

  submitNote.addEventListener('click', () => {
    const note = userNote.value.trim() || 'Feeling better now...';
    noteInputArea.style.display = 'none';
    submittedNote.textContent = '"' + note + '"';
    submittedNote.style.display = 'block';
  });

  resetBtn.addEventListener('click', () => {
    progress = 0;
    bar.style.width = '0%';
    bar.style.background = '#7F77DD';
    pct.textContent = '0%';
    emoji.textContent = '😐';
    status.textContent = 'Press start, then SCREAM!';
    gameScreen.style.display = 'block';
    winnerScreen.style.display = 'none';
  });

  startBtn.addEventListener('click', () => {
    if (running) { stopGame(); status.textContent = 'Paused. Press start to continue!'; }
    else { startGame(); }
  });
</script>
</body>
</html>
